<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindset Plus – כיתה ט׳</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(160deg,#0f2027,#203a43,#2c5364);min-height:100vh;direction:rtl;color:#fff}
#app{max-width:720px;margin:0 auto;padding:10px 10px 40px}

header{text-align:center;padding:16px 8px 8px}
header h1{font-size:1.6rem;letter-spacing:.5px;font-weight:800;color:#e2e8f0;margin-bottom:4px}
header p{font-size:.82rem;color:#94a3b8;margin-bottom:8px}
#scorebar{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
#scorebar span{background:rgba(255,255,255,.12);padding:4px 16px;border-radius:20px;font-size:.85rem;font-weight:700;color:#e2e8f0}

nav{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0}
nav button{background:rgba(255,255,255,.1);color:#cbd5e1;border:1.5px solid rgba(255,255,255,.2);border-radius:20px;padding:7px 13px;font-size:.8rem;cursor:pointer;transition:.18s;font-family:inherit;font-weight:600}
nav button.active,nav button:hover{background:rgba(255,255,255,.95);color:#1e293b;border-color:transparent}

#gc{background:#1e293b;border-radius:18px;padding:22px 20px;min-height:340px;box-shadow:0 8px 40px rgba(0,0,0,.4)}

.sec-title{text-align:center;font-size:1rem;color:#7dd3fc;font-weight:700;margin-bottom:12px;letter-spacing:.3px}
.prog{font-size:.8rem;color:#64748b;margin-bottom:10px;text-align:center}

/* flashcard */
.flip-scene{perspective:900px;width:100%;max-width:440px;margin:0 auto 14px;height:175px;cursor:pointer}
.flip-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:.5s}
.flip-card.flipped{transform:rotateY(180deg)}
.flip-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.flip-front{background:linear-gradient(135deg,#1d4ed8,#3b82f6);border:1.5px solid rgba(255,255,255,.2)}
.flip-back{background:linear-gradient(135deg,#7c3aed,#a855f7);border:1.5px solid rgba(255,255,255,.2);transform:rotateY(180deg)}
.flip-en{font-size:1.9rem;font-weight:800;color:#fff;margin-bottom:4px}
.flip-he{font-size:1.7rem;font-weight:700;color:#fff}
.flip-hint{font-size:.76rem;color:rgba(255,255,255,.6);margin-top:8px}
.flip-type{font-size:.72rem;color:rgba(255,255,255,.5);margin-top:2px;font-style:italic}

/* buttons */
.btn{border:none;border-radius:12px;padding:11px 22px;font-size:.95rem;cursor:pointer;margin:5px;transition:.18s;font-family:inherit;font-weight:700;color:#fff}
.btn:hover{transform:translateY(-2px);filter:brightness(1.1)}
.btn-blue{background:linear-gradient(135deg,#2563eb,#1d4ed8)}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#6d28d9)}
.btn-green{background:linear-gradient(135deg,#059669,#047857)}
.btn-sm{padding:7px 14px;font-size:.82rem}
.btn-row{display:flex;justify-content:center;gap:8px;margin-top:14px;flex-wrap:wrap}
.nav-row{display:flex;justify-content:space-between;margin-top:12px;flex-wrap:wrap;gap:8px}

/* options */
.opts{display:flex;flex-direction:column;gap:9px;margin:12px 0}
.opt{background:#0f172a;border:1.5px solid #334155;border-radius:11px;padding:13px 16px;cursor:pointer;font-size:.97rem;text-align:right;transition:.18s;font-family:inherit;color:#e2e8f0;line-height:1.45}
.opt:hover:not(.disabled){background:#1e3a5f;border-color:#3b82f6;transform:translateX(-3px)}
.opt.correct{background:#064e3b!important;border-color:#10b981!important;color:#6ee7b7}
.opt.wrong{background:#450a0a!important;border-color:#ef4444!important;color:#fca5a5}
.opt.disabled{pointer-events:none;opacity:.85}

/* question text */
.q-en{font-size:1.1rem;font-weight:700;color:#e2e8f0;margin:8px 0 16px;line-height:1.6;text-align:center;background:#0f172a;border-radius:10px;padding:12px 16px}
.q-he{font-size:1.15rem;font-weight:700;color:#a78bfa;margin:8px 0 16px;line-height:1.6;text-align:center;background:#0f172a;border-radius:10px;padding:12px 16px}
.word-big{font-size:1.7rem;font-weight:800;color:#7dd3fc;text-align:center;margin:10px 0 18px;display:block}

/* feedback */
.fb{text-align:center;font-size:1.2rem;font-weight:700;padding:10px 14px;border-radius:10px;margin:10px 0;display:none}
.fb.show{display:block}
.fb.ok{background:#064e3b;color:#6ee7b7}
.fb.no{background:#450a0a;color:#fca5a5}

/* matching */
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-col-title{text-align:center;font-size:.78rem;color:#64748b;font-weight:700;margin-bottom:2px}
.mi{background:#0f172a;border:1.5px solid #334155;border-radius:11px;padding:11px 10px;cursor:pointer;text-align:center;font-size:.93rem;color:#e2e8f0;transition:.18s;line-height:1.3}
.mi:hover:not(.matched){background:#1e3a5f;border-color:#3b82f6}
.mi.sel{border-color:#7c3aed;background:#1e1b4b;box-shadow:0 0 0 2px rgba(124,58,237,.4)}
.mi.matched{background:#064e3b;border-color:#10b981;color:#6ee7b7;pointer-events:none}
.mi.bad{background:#450a0a;border-color:#ef4444;animation:shk .35s}
@keyframes shk{0%,100%{transform:translateX(0)}30%{transform:translateX(-6px)}70%{transform:translateX(6px)}}

/* done */
.done-scr{text-align:center;padding:30px 10px}
.done-scr .ico{font-size:3.5rem;margin-bottom:10px}
.done-scr p{font-size:1.2rem;color:#7dd3fc;font-weight:700;margin-bottom:18px}

/* confetti */
#cw{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.cp{position:absolute;width:9px;height:9px;border-radius:2px;animation:cf linear forwards}
@keyframes cf{to{transform:translateY(105vh) rotate(720deg);opacity:0}}

/* sentence translate mode tabs */
.dir-toggle{display:flex;justify-content:center;gap:10px;margin-bottom:14px}
.dir-btn{background:#0f172a;border:1.5px solid #334155;border-radius:20px;padding:6px 16px;font-size:.82rem;cursor:pointer;color:#94a3b8;font-family:inherit;font-weight:600;transition:.18s}
.dir-btn.active{background:#2563eb;border-color:#2563eb;color:#fff}

@media(max-width:480px){
  .flip-en{font-size:1.4rem}.flip-he{font-size:1.3rem}
  .opt{font-size:.9rem} nav button{font-size:.75rem;padding:6px 10px}
  .match-cols{gap:6px} .mi{font-size:.83rem;padding:8px 6px}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>📘 Mindset Plus – כיתה ט׳</h1>
    <p>תרגל אוצר מילים ומשפטים</p>
    <div id="scorebar">
      <span>⭐ ניקוד: <b id="s-score">0</b></span>
      <span>🔥 רצף: <b id="s-streak">0</b></span>
    </div>
  </header>
  <nav>
    <button id="tab-flash"   onclick="setMode('flash')">📇 כרטיסיות</button>
    <button id="tab-vocab"   onclick="setMode('vocab')">🔤 בחירה</button>
    <button id="tab-fillin"  onclick="setMode('fillin')">✏️ השלמה</button>
    <button id="tab-sent"    onclick="setMode('sent')">🌍 תרגום משפטים</button>
    <button id="tab-match"   onclick="setMode('match')">🔗 התאמה</button>
  </nav>
  <div id="gc"></div>
</div>
<div id="cw"></div>

<script>

// Fill-in questions — only words from VOCAB above
const FILLIN = [
  {q:'I asked him to ___ the meeting because I was sick.',
   ans:'postpone', opts:['postpone','approve','greet','wipe']},
  {q:'The manager had to ___ the new budget plan.',

  {en:'Because of the news, the economic situation looks worse.',

// (pulled from the same SENTENCES array, flipped)

const MATCHING_POOL = [

const G = {

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
const shuffle = a => [...a].sort(()=>Math.random()-.5);
const gc = () => document.getElementById('gc');
function el(tag, cls, txt){
  const e=document.createElement(tag); e.className=cls;
  if(txt!==undefined) e.textContent=txt; return e;
}
function btn(txt, cls, fn){
  const b=document.createElement('button'); b.className='btn '+cls;
  b.textContent=txt; b.onclick=fn; return b;
}

function speak(text, lang='en-US', rate=0.85){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang; u.rate=rate; speechSynthesis.speak(u);
}

function addScore(n){
  G.score+=n; G.streak++;
  document.getElementById('s-score').textContent=G.score;
  document.getElementById('s-streak').textContent=G.streak;
  if(G.streak>=3) confetti();
}
function resetStreak(){
  G.streak=0;
  document.getElementById('s-streak').textContent=0;
}

function confetti(){
  const w=document.getElementById('cw'); w.innerHTML='';
  const cols=['#3b82f6','#f59e0b','#10b981','#ef4444','#8b5cf6','#06b6d4','#f97316'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div'); p.className='cp';
    p.style.cssText=`left:${Math.random()*100}%;top:-12px;background:${cols[i%cols.length]};
      transform:rotate(${Math.random()*360}deg);
      animation-duration:${1.2+Math.random()*1.5}s;
      animation-delay:${Math.random()*.7}s`;
    w.appendChild(p);
  }
  setTimeout(()=>w.innerHTML='',3800);
}

function doneScreen(onRestart){
  gc().innerHTML='';
  const d=document.createElement('div'); d.className='done-scr';
  d.appendChild(el('div','ico','🏆'));
  d.appendChild(el('p','','כל הכבוד! סיימת את כל השאלות!'));
  d.appendChild(btn('שחק שוב 🔄','btn-green',onRestart));
  gc().appendChild(d); confetti();
}

function showFeedback(correct, clickedEl){
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('disabled'));
  clickedEl.classList.add(correct?'correct':'wrong');
  if(!correct){
    document.querySelectorAll('.opt').forEach(o=>{
      if(o.dataset.correct==='1') o.classList.add('correct');
    });
  }
  const fb=document.getElementById('fb');
  if(fb){ fb.textContent=correct?'✅ נכון!':'❌ לא נכון'; fb.className='fb show '+(correct?'ok':'no'); }
  correct ? addScore(10) : resetStreak();
}

// ═══════════════════════════════════════════════════════
//  NAV
// ═══════════════════════════════════════════════════════
function setMode(m){
  G.mode=m;
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+m).classList.add('active');
  speechSynthesis && speechSynthesis.cancel();
  ({flash:initFlash, vocab:initVocab, fillin:initFillIn, sent:initSent, match:initMatch})[m]();
}

// ═══════════════════════════════════════════════════════
//  A. FLASHCARDS
// ═══════════════════════════════════════════════════════
function initFlash(){
  G.queue=shuffle(VOCAB); G.qi=0; G.flipped=false; renderFlash();
}
function renderFlash(){
  const v=G.queue[G.qi]; const box=gc(); box.innerHTML='';
  box.appendChild(el('div','sec-title','📇 כרטיסיות — לחץ לראות עברית'));
  box.appendChild(el('div','prog',`${G.qi+1} / ${G.queue.length}`));

  const scene=document.createElement('div'); scene.className='flip-scene';
  const card=document.createElement('div'); card.className='flip-card'+(G.flipped?' flipped':'');
  card.onclick=()=>{G.flipped=!G.flipped; card.classList.toggle('flipped'); hint.textContent=G.flipped?'לחץ לחזרה':'לחץ לתרגום';};

  const front=document.createElement('div'); front.className='flip-face flip-front';
  const hint=el('div','flip-hint',G.flipped?'לחץ לחזרה':'לחץ לתרגום');
  front.append(el('div','flip-en',v.en), el('div','flip-type',v.pos), hint);

  const back=document.createElement('div'); back.className='flip-face flip-back';
  back.appendChild(el('div','flip-he',v.he));

  card.append(front,back); scene.appendChild(card);

  const sndBtn=btn('🔊 שמע','btn-blue btn-sm',()=>speak(v.en));
  sndBtn.style.display='block'; sndBtn.style.margin='0 auto 10px';

  const navRow=document.createElement('div'); navRow.className='nav-row';
  navRow.append(
    btn('◀ קודם','btn-purple btn-sm',()=>{G.qi=(G.qi-1+G.queue.length)%G.queue.length; G.flipped=false; renderFlash();}),
    btn('הבא ▶','btn-purple btn-sm',()=>{G.qi=(G.qi+1)%G.queue.length; if(G.qi===0)G.queue=shuffle(VOCAB); G.flipped=false; renderFlash();})
  );
  box.append(scene, sndBtn, navRow);
}

// ═══════════════════════════════════════════════════════
//  B. VOCAB MULTIPLE CHOICE (harder — 4 close options)
// ═══════════════════════════════════════════════════════
function initVocab(){
  G.queue=shuffle(VOCAB); G.qi=0; renderVocab();
}
function renderVocab(){
  if(G.qi>=G.queue.length){doneScreen(initVocab);return;}
  const v=G.queue[G.qi];
  const wrong=shuffle(VOCAB.filter(x=>x.en!==v.en)).slice(0,3);
  const opts=shuffle([v,...wrong]);

  const box=gc(); box.innerHTML='';
  box.append(el('div','sec-title','🔤 מה המשמעות בעברית?'), el('div','prog',`${G.qi+1} / ${G.queue.length}`));

  const qRow=document.createElement('div'); qRow.style.cssText='text-align:center;margin:8px 0 18px';
  qRow.append(el('span','word-big',v.en));
  const snd=btn('🔊','btn-blue btn-sm',()=>speak(v.en)); snd.style.display='block'; snd.style.margin='0 auto';
  qRow.appendChild(snd);
  box.appendChild(qRow);

  const optDiv=document.createElement('div'); optDiv.className='opts';
  const fb=el('div','fb',''); fb.id='fb';

  opts.forEach(o=>{
    const b=document.createElement('div'); b.className='opt'; b.textContent=o.he;
    b.onclick=()=>{showFeedback(o.en===v.en, b); if(o.en===v.en) speak(v.en); setTimeout(()=>{G.qi++; renderVocab();}, o.en===v.en?1200:1800);};
    if(o.en===v.en) b.dataset.correct='1';
    optDiv.appendChild(b);
  });
  box.append(optDiv,fb);
}

// ═══════════════════════════════════════════════════════
//  C. FILL IN THE BLANK
// ═══════════════════════════════════════════════════════
function initFillIn(){
  G.queue=shuffle(FILLIN); G.qi=0; renderFillIn();
}
function renderFillIn(){
  if(G.qi>=G.queue.length){doneScreen(initFillIn);return;}
  const q=G.queue[G.qi]; const opts=shuffle(q.opts);
  const full=q.q.replace('___',q.ans);

  const box=gc(); box.innerHTML='';
  box.append(el('div','sec-title','✏️ השלם את המשפט'), el('div','prog',`${G.qi+1} / ${G.queue.length}`));

  // Build question with highlighted blank
  const qDiv=document.createElement('div'); qDiv.className='q-en';
  const parts=q.q.split('___');
  qDiv.appendChild(document.createTextNode(parts[0]));
  const blk=el('span','','______'); blk.style.cssText='border-bottom:2px solid #3b82f6;color:#7dd3fc;font-weight:800;padding:0 4px';
  qDiv.appendChild(blk);
  if(parts[1]) qDiv.appendChild(document.createTextNode(parts[1]));
  box.appendChild(qDiv);

  const snd=btn('🔊 שמע משפט','btn-blue btn-sm',()=>speak(full)); snd.style.display='block'; snd.style.margin='0 auto 12px';
  box.appendChild(snd);

  const optDiv=document.createElement('div'); optDiv.className='opts';
  const fb=el('div','fb',''); fb.id='fb';

  opts.forEach(o=>{
    const b=document.createElement('div'); b.className='opt'; b.textContent=o;
    b.onclick=()=>{
      showFeedback(o===q.ans, b);
      if(o===q.ans) speak(full);
      setTimeout(()=>{G.qi++; renderFillIn();}, o===q.ans?1300:1900);
    };
    if(o===q.ans) b.dataset.correct='1';
    optDiv.appendChild(b);
  });
  box.append(optDiv,fb);
}

// ═══════════════════════════════════════════════════════
//  D. SENTENCE TRANSLATION (EN↔HE)
// ═══════════════════════════════════════════════════════
function initSent(){
  G.queue=shuffle(SENTENCES); G.qi=0; renderSent();
}

function renderSent(){
  if(G.qi>=G.queue.length){doneScreen(initSent);return;}

  const box=gc(); box.innerHTML='';
  box.appendChild(el('div','sec-title','🌍 תרגום משפטים'));
  box.appendChild(el('div','prog',`${G.qi+1} / ${G.queue.length}`));

  // direction toggle
  const tog=document.createElement('div'); tog.className='dir-toggle';
  const bEH=document.createElement('button'); bEH.className='dir-btn'+(G.sentDir==='enHe'?' active':''); bEH.textContent='🇬🇧 → 🇮🇱 אנגלית לעברית';
  const bHE=document.createElement('button'); bHE.className='dir-btn'+(G.sentDir==='heEn'?' active':''); bHE.textContent='🇮🇱 → 🇬🇧 עברית לאנגלית';
  bEH.onclick=()=>{G.sentDir='enHe'; G.queue=shuffle(SENTENCES); G.qi=0; renderSent();};
  bHE.onclick=()=>{G.sentDir='heEn'; G.queue=shuffle(SENTENCES); G.qi=0; renderSent();};
  tog.append(bEH,bHE); box.appendChild(tog);

  const s=G.queue[G.qi];
  const optDiv=document.createElement('div'); optDiv.className='opts';
  const fb=el('div','fb',''); fb.id='fb';

  if(G.sentDir==='enHe'){
    // Show English → pick Hebrew
    const qDiv=el('div','q-en',s.en);
    const snd=btn('🔊','btn-blue btn-sm',()=>speak(s.en));
    snd.style.display='block'; snd.style.margin='4px auto 14px';
    box.append(qDiv,snd);

    const allOpts=shuffle([s.he,...s.distractorsHe]);
    allOpts.forEach(o=>{
      const b=document.createElement('div'); b.className='opt'; b.textContent=o;
      b.onclick=()=>{showFeedback(o===s.he,b); if(o===s.he) speak(s.en); setTimeout(()=>{G.qi++;renderSent();},o===s.he?1400:2000);};
      if(o===s.he) b.dataset.correct='1';
      optDiv.appendChild(b);
    });

  } else {
    // Show Hebrew → pick English
    const qDiv=el('div','q-he',s.he);
    box.appendChild(qDiv);

    // Build 3 wrong English options from other sentences
    const wrongEn=shuffle(SENTENCES.filter(x=>x.en!==s.en)).slice(0,3).map(x=>x.en);
    const allOpts=shuffle([s.en,...wrongEn]);
    allOpts.forEach(o=>{
      const b=document.createElement('div'); b.className='opt'; b.textContent=o;
      b.onclick=()=>{showFeedback(o===s.en,b); if(o===s.en) speak(s.en); setTimeout(()=>{G.qi++;renderSent();},o===s.en?1400:2000);};
      if(o===s.en) b.dataset.correct='1';
      optDiv.appendChild(b);
    });
  }

  box.append(optDiv,fb);
}

// ═══════════════════════════════════════════════════════
//  E. MATCHING
// ═══════════════════════════════════════════════════════
function initMatch(){
  const pairs=shuffle(MATCHING_POOL).slice(0,9);
  G.matchPairs=pairs.map((p,i)=>({en:p.en, he:p.he, matched:false}));
  G.leftOrder=shuffle(G.matchPairs.map((_,i)=>i));
  G.rightOrder=shuffle(G.matchPairs.map((_,i)=>i));
  G.matchSelSide=null; G.matchSelIdx=null; G.matchDone=0;
  renderMatch();
}

function renderMatch(){
  const box=gc(); box.innerHTML='';
  box.append(el('div','sec-title','🔗 התאם אנגלית לעברית'), el('div','prog',`הותאמו: ${G.matchDone} / ${G.matchPairs.length}`));

  const cols=document.createElement('div'); cols.className='match-cols';
  const cL=document.createElement('div'); cL.className='match-col';
  const cR=document.createElement('div'); cR.className='match-col';
  cL.appendChild(el('div','match-col-title','English'));
  cR.appendChild(el('div','match-col-title','עברית'));

  G.leftOrder.forEach(idx=>{
    const p=G.matchPairs[idx];
    const item=document.createElement('div');
    item.className='mi'+(p.matched?' matched':'')+(G.matchSelSide==='L'&&G.matchSelIdx===idx?' sel':'');
    item.textContent=p.en;
    if(!p.matched) item.onclick=()=>mClick('L',idx);
    cL.appendChild(item);
  });
  G.rightOrder.forEach(idx=>{
    const p=G.matchPairs[idx];
    const item=document.createElement('div');
    item.className='mi'+(p.matched?' matched':'')+(G.matchSelSide==='R'&&G.matchSelIdx===idx?' sel':'');
    item.textContent=p.he;
    if(!p.matched) item.onclick=()=>mClick('R',idx);
    cR.appendChild(item);
  });

  cols.append(cL,cR); box.appendChild(cols);
}

function mClick(side,idx){
  if(G.matchSelSide===null){ G.matchSelSide=side; G.matchSelIdx=idx; renderMatch(); return; }
  if(G.matchSelSide===side){ G.matchSelSide=side; G.matchSelIdx=idx; renderMatch(); return; }

  const lIdx=side==='L'?idx:G.matchSelIdx;
  const rIdx=side==='R'?idx:G.matchSelIdx;
  G.matchSelSide=null; G.matchSelIdx=null;

  if(lIdx===rIdx){
    G.matchPairs[lIdx].matched=true; G.matchDone++;
    addScore(15); renderMatch();
    if(G.matchDone===G.matchPairs.length) setTimeout(()=>doneScreen(initMatch),600);
  } else {
    renderMatch();
    const lPair=G.matchPairs[lIdx]; const rPair=G.matchPairs[rIdx];
    document.querySelectorAll('.mi').forEach(it=>{
      const txt=it.textContent.trim();
      if(txt===lPair.en||txt===rPair.he){ it.classList.add('bad'); setTimeout(()=>it.classList.remove('bad'),500); }
    });
    resetStreak();
  }
}

// ── START ──
setMode('flash');
</script>
